{% extends 'base.html' %}
{% block title %}Login — ConnectPro{% endblock %}
{% block auth_content %}
<div class="auth-card">
  <div class="auth-logo"><span class="brand-name">⚡ ConnectPro</span></div>
  <h2 class="auth-title">Welcome back</h2>
  <p class="auth-subtitle">Sign in to your professional network</p>
  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="username" class="form-control" placeholder="you@example.com" required autofocus/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
    </div>
    {% if form.errors %}
      <div class="alert alert-error">Invalid email or password.</div>
    {% endif %}
    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
  </form>
  <div class="auth-link">Don't have an account? <a href="{% url 'accounts:register' %}">Join ConnectPro</a></div>
</div>
{% endblock %}
