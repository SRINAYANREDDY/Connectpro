services:
  - type: web
    name: connectpro
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT connectpro.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: connectpro-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: connectpro-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: connectpro-db
    plan: free

  - type: redis
    name: connectpro-redis
    plan: free
